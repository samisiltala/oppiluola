/* =============================
RAAMATUN KAPPALEJAKO MENUUN
============================= */
function buildBibleChapters(book,item){

if(!bibleIndex) return;

let list=document.createElement("div");
let chapters=[];

Object.keys(bibleIndex).forEach(function(k){

let parts=k.split(" ");
let last=parts.pop();

if(last.includes(":")) return;   // ohitetaan jaeavaimet

let ch=parseInt(last);
let bk=parts.join(" ");

if(bk.replace(/\s/g,"") === book.replace(/\s/g,"")){

if(!chapters.includes(ch)){
chapters.push(ch);
}

}

});

chapters.sort((a,b)=>a-b);

chapters.forEach(function(ch){

let div=document.createElement("div");

div.textContent=ch;
div.style.paddingLeft="25px";
div.style.cursor="pointer";

div.onclick=function(e){

e.stopPropagation();

document.getElementById("toggleBible").checked=true;
updatePanels();

showBibleChapter(book,ch);
currentBibleBook = book;
currentBibleChapter = ch;
};

list.appendChild(div);

});

item.appendChild(list);

}

/* =============================
INDEKSI
============================= */

function buildIndex(){

sermons.forEach(function(s){

let text=(s.title+" "+s.text).toLowerCase();
let words=text.match(/\b\w+\b/g);

if(!words) return;

words.forEach(function(w){

if(!wordIndex[w]) wordIndex[w]=[];

if(!wordIndex[w].includes(s.id)){
wordIndex[w].push(s.id);
}

});

});

}

function buildBibleBooks(){

let list=document.createElement("div");
list.style.display="none";

let div=document.getElementById("bibleBooks");

div.innerHTML="";

function buildSection(title,books){

let section=document.createElement("div");

let head=document.createElement("div");
head.textContent="▼ "+title;
head.style.fontWeight="bold";
head.style.marginTop="10px";
head.style.cursor="pointer";

let list=document.createElement("div");
list.style.display="none";

books.forEach(function(b){

let item=document.createElement("div");

item.style.paddingLeft="12px";
item.style.cursor="pointer";
item.style.fontWeight="500";

let arrow=document.createElement("span");
arrow.textContent="▶ ";

let title=document.createElement("span");
title.textContent=bibleNames[b] || b;

item.appendChild(arrow);
item.appendChild(title);

item.onclick=function(){

let existing=item.querySelector(".chapters");

if(existing){
existing.remove();
arrow.textContent="▶ ";
return;
}

let container=document.createElement("div");
container.className="chapters";

buildBibleChapters(b,container);

item.appendChild(container);

arrow.textContent="▼ ";

};

list.appendChild(item);

});

head.onclick=function(){

list.style.display=
list.style.display=="none" ? "block":"none";

};

section.appendChild(head);
section.appendChild(list);

div.appendChild(section);

}

buildSection("Vanha testamentti",bibleBooksOT);
buildSection("Uusi testamentti",bibleBooksNT);

}

let sidebar=document.getElementById("sermonList");
sidebar.innerHTML="";

currentList=sermons;

sermons.forEach(s=>{

let div=document.createElement("div");

div.textContent=s.id+" "+cleanTitle(s.title);

div.style.cursor="pointer";
div.style.padding="4px";

div.onclick=()=>showSermon(s.id);

sidebar.appendChild(div);

});

}

/* =============================
LUKUPANEELIEN OHJAUS
============================= */
function updatePanels(){

let bible=document.getElementById("toggleBible").checked;
let luther=document.getElementById("toggleLuther").checked;
let lestadius=document.getElementById("toggleLestadius").checked;

document.getElementById("biblePanel").style.display=bible?"block":"none";
document.getElementById("lutherPanel").style.display=luther?"block":"none";
document.getElementById("lestadiusPanel").style.display=lestadius?"block":"none";

}

document.getElementById("toggleBible").onchange=updatePanels;
document.getElementById("toggleLuther").onchange=updatePanels;
document.getElementById("toggleLestadius").onchange=updatePanels;


/* =============================
NÄYTÄ SAARNA
============================= */

function showSermon(id,openPanel=true){

hideStartScreen();

if(openPanel){
document.getElementById("toggleLestadius").checked=true;
updatePanels();
}

let s = sermons.find(s => s.id == id);
if(!s) return;

let q=document.getElementById("search").value.toLowerCase().trim();
let words=q.split(/\s+/);

/* pilkotaan teksti riveihin */

let lines=(s.text || "").split("\n");

/* pääotsikko */

let title = s.id + ". " + cleanTitle(s.title || "");

/* otsikon jatko ensimmäiseltä riviltä */

if(lines.length && lines[0].length<80){
title += " " + lines.shift();
}

/* alaotsikot */

let subtitle1="";
let subtitle2="";

if(lines.length && lines[0].length<80){
subtitle1=lines.shift();
}

if(lines.length && lines[0].length<80){
subtitle2=lines.shift();
}

/* varsinainen teksti */

let text=lines.join("\n");

text=highlightWords(text,words);
text=linkBibleRefs(text);

/* rakennetaan html */

let html="";

html+="<div class='sermonTitle'>"+title+"</div>";

if(subtitle1){
html+="<div class='sermonDay'>"+subtitle1+"</div>";
}

if(subtitle2){
html+="<div class='sermonMeta'>"+subtitle2+"</div>";
}

html+="<div class='sermonText'>"+text+"</div>";

document.querySelector("#lestadiusPanel .text").innerHTML=html;

window.scrollTo(0,0);

}
if(window.innerWidth<900){
document.getElementById("library").classList.remove("open");
}

/* =============================
HAKU
============================= */

document.getElementById("search").addEventListener("input",function(){

let q=this.value.toLowerCase().trim();

if(q===""){
buildLestadiusMenu();
return;
}

let filtered=sermons.filter(function(s){

let text=(s.title+" "+s.text).toLowerCase();

return text.includes(q);

});

buildFilteredList(filtered);

});


function buildFilteredList(arr){

let sidebar=document.getElementById("sermonList");

sidebar.innerHTML="";

/* palautetaan napit */


currentList=arr;

arr.forEach(function(s){

let div=document.createElement("div");

div.style.cursor="pointer";
div.style.padding="6px";

let title=s.id+" "+cleanTitle(s.title);

div.innerHTML="<b>"+title+"</b>";

div.onclick=function(){showSermon(s.id)};

sidebar.appendChild(div);

});

}


/* =============================
RAAMATUN AVAUS
============================= */

function showBibleVerse(book,chapter,verse){

let v=bible.find(x=>
x.chapter==chapter &&
x.verse==verse &&
x.book.toLowerCase().includes(book.toLowerCase())
);

if(!v) return;

document.querySelector("#biblePanel .text").innerText=
verse+" "+v.text;

}

/* =============================
RAAMATUN KAPPALE
============================= */

function showBibleChapter(book,chapter){

hideStartScreen();
currentBook=book;
currentChapter=chapter;
currentBibleBook = book;
currentBibleChapter = chapter;

console.log("BOOK RAW:", book);
console.log("BOOK NORMALIZED:", book.replace(/\s/g,""));

if(!bibleIndex) return;
let key=null;

Object.keys(bibleIndex).forEach(function(k){

let parts=k.split(" ");
let last=parts.pop();

if(last.includes(":")) return;

let ch=parseInt(last);
let bk=parts.join(" ");

if(ch===chapter && bk.replace(/\s/g,"")===book.replace(/\s/g,"")){
key=k;
}

});

if(!key){
console.log("Lukua ei löytynyt:", book, chapter);
return;
}

console.log("Index löytyy:", key);

let ids=bibleIndex[key];

let html="";

html = ids.map(i => {

let v = bible[i];
return v.verse + " " + v.text;

}).join("\n");

document.querySelector("#biblePanel .text").innerText=html;
document.querySelector("#biblePanel h2").innerText =
(bibleNames[book] || book) + " " + chapter;

}

if(window.innerWidth<900){
document.getElementById("library").classList.remove("open");
}

/* =============================
NAVIGOINTI
============================= */
function prevChapter(){

if(!currentBook) return;

let prev=currentChapter-1;

if(prev<1) return;

showBibleChapter(currentBook,prev);

}


/* =============================
SANA KOROSTUS
============================= */

function highlightWords(text,words){

words.forEach(function(w,i){

if(!w) return;

let pattern="\\b"+w.replace(/\*/g,"\\w*");

let re=new RegExp(pattern,"gi");

if(i==0){
text=text.replace(re,"<mark>$&</mark>");
}else{
text=text.replace(re,"<mark class='m2'>$&</mark>");
}

});

return text;

}


/* =============================
LUTHER HAKUTULOKSET AUKI
============================= */
function openLutherResult(id,query){

let book = lutherCorpus.find(b => b.id == id);

if(!book) return;

document.getElementById("toggleLuther").checked=true;
updatePanels();

let text = book.text;

let q = query.toLowerCase();
let pos = text.toLowerCase().indexOf(q);

let start = Math.max(0,pos-300);
let end = Math.min(text.length,pos+800);

let snippet = text.substring(start,end);

snippet = highlightWords(snippet,[query]);

document.querySelector("#lutherPanel .text").innerHTML =
snippet.replace(/\n/g,"<br>");

}

/* =============================
RAAMATUN LINKITYS
============================= */

function linkBibleRefs(text){

let re=/(\()?((?:[1-3]\.?\s*)?[A-Za-zÅÄÖåäö\.]+)\s*(\d+)\s*:\s*(\d+(?:[-–]\d+)?)/g;


return text.replace(re,function(match,prefix,book,chapter,verse){

let ref=(book+" "+chapter+":"+verse)
.replace(/\./g,"")
.toLowerCase();
if(verse.includes("-")){
verse=verse.split("-")[0];
}

return prefix+"<span class='bibleref' data-ref='"+ref+"'>"+book+" "+chapter+":"+verse+"</span>";

});

}


/* =============================
RAAMATUN KLIKKAUS
============================= */

document.addEventListener("click",function(e){

if(e.target.classList.contains("bibleref")){

document.getElementById("toggleBible").checked=true;
updatePanels();

let ref=e.target.dataset.ref;

let m=ref.match(/^(.+)\s(\d+):(\d+)$/);

if(!m) return;

let chapter=parseInt(m[2]);
let verse=parseInt(m[3]);

showBibleChapter(m[1],chapter);

}

});


/* =============================
RAAMATUN POPUP
============================= */

document.addEventListener("mouseover",function(e){

if(e.target.classList.contains("bibleref")){

let ref=e.target.dataset.ref;

let m=ref.match(/^(.+)\s(\d+):(\d+)$/);

if(!m) return;

let chapter=parseInt(m[2]);
let verse=parseInt(m[3]);

let book = m[1].replace(/\./g,"").replace(/\s/g,"").toLowerCase();

let prev=bible.find(x =>
x.book==book &&
x.chapter==chapter &&
x.verse==verse-1
);

let curr=bible.find(x =>
x.book==book &&
x.chapter==chapter &&
x.verse==verse
);

let next=bible.find(x =>
x.book==book &&
x.chapter==chapter &&
x.verse==verse+1
);

if(!curr) return;

let popup=document.getElementById("biblePopup");

let html="<b>"+ref+"</b><br>";

if(prev){
html+=prev.verse+" "+prev.text+"<br>";
}

html+="<b>"+curr.verse+" "+curr.text+"</b><br>";

if(next){
html+=next.verse+" "+next.text;
}

popup.innerHTML=html;

popup.style.left=(e.pageX+10)+"px";
popup.style.top=(e.pageY+10)+"px";

popup.style.display="block";
}

});


document.addEventListener("mouseout",function(e){

if(e.target.classList.contains("bibleref")){

document.getElementById("biblePopup").style.display="none";

}

});

APU

}

runSearch("");

}

if(settingsBtn){

settingsBtn.onclick=function(){

document.getElementById("readerSettings")
.classList.toggle("open");

};

}

window.addEventListener("load",function(){

updatePanels();

});

document.getElementById("fontSelect").onchange=function(){

let f=this.value;

let family="Georgia, serif";

if(f==="georgia") family="Georgia, serif";
if(f==="garamond") family="Garamond, serif";
if(f==="sans") family="Arial, sans-serif";

el.style.fontFamily=family;
});

};

document.getElementById("bgSelect").onchange=function(){

document.body.classList.remove("bg-sepia","bg-soft","bg-dark");

let v=this.value;

if(v==="sepia") document.body.classList.add("bg-sepia");
if(v==="soft") document.body.classList.add("bg-soft");
if(v==="dark") document.body.classList.add("bg-dark");

};

document.getElementById("menuBtn").onclick=function(){

document.getElementById("library").classList.toggle("open");
document.getElementById("menuOverlay").classList.toggle("open");

};

let touchStartX = 0;
let touchEndX = 0;

let biblePanel = document.getElementById("biblePanel");

biblePanel.addEventListener("touchstart",function(e){
touchStartX = e.changedTouches[0].screenX;
});

biblePanel.addEventListener("touchend",function(e){

touchEndX = e.changedTouches[0].screenX;
handleSwipe();

});

function handleSwipe(){

let diff = touchEndX - touchStartX;

if(Math.abs(diff) < 50) return;

if(diff > 0){

prevChapter();
animateBible("right");

}else{

nextChapter();
animateBible("left");

}

}

function animateBible(direction){

let panel = document.querySelector("#biblePanel .text");

panel.classList.remove("bibleSlideLeft","bibleSlideRight");

if(direction==="left"){
panel.classList.add("bibleSlideLeft");
}else{
panel.classList.add("bibleSlideRight");
}

}

function nextChapter(){

if(!currentBibleBook) return;

showBibleChapter(currentBibleBook, currentBibleChapter + 1);

}

function previousChapter(){

if(!currentBibleBook) return;

if(currentBibleChapter > 1){
showBibleChapter(currentBibleBook,currentBibleChapter-1);
return;
}

/* edellinen kirja */

let i = bibleBooksAll.indexOf(currentBibleBook);

if(i > 0){

let prevBook = bibleBooksAll[i-1];

/* etsi viimeinen luku */

let chapter = 1;

while(bibleIndex[(prevBook+" "+(chapter+1)).toLowerCase()]){
chapter++;
}

showBibleChapter(prevBook,chapter);

}

}

document.getElementById("menuOverlay").onclick=function(){

document.getElementById("library").classList.remove("open");
this.classList.remove("open");

};

let start=document.getElementById("startScreen");

if(start){

start.onclick=function(){

let sound=document.getElementById("startSound");

if(sound){

sound.volume=0.25;
sound.currentTime=0;

sound.play().catch(()=>{});

}

/* avataan sovellus */

hideStartScreen();

document.getElementById("toggleBible").checked=true;
updatePanels();

showBibleChapter("gen",1);

};

document.getElementById("bibleVersionSelect").onchange=function(){

let v=this.value;

bibleVersion=v;

fetch("data/bible"+bibleVersion+".json")
.then(r=>r.json())
.then(data=>{

bible=data;

if(currentBibleBook && currentBibleChapter){
showBibleChapter(currentBibleBook,currentBibleChapter);
}

});

};

}
