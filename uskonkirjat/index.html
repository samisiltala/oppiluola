<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Uskonkirjat</title>

<style>

body{
margin:0;
font-family:serif;
}

#container{
display:flex;
height:100vh;
}

#search{
width:100%;
padding:8px;
margin-bottom:8px;
border:1px solid #ccc;
border-radius:4px;
font-size:14px;
box-sizing:border-box;
}

#resultCount{
font-size:12px;
color:#666;
margin-bottom:10px;
}

mark{
background:yellow;
}

mark.m2{
background:#9df59d;
}

#sidebar{
width:320px;
overflow-y:auto;
border-right:1px solid #ccc;
padding:10px;
background:#f5f5f5;
}

#content{
flex:1;
padding:40px;
overflow-y:auto;
max-width:900px;
margin:auto;
line-height:1.6;
}

#sidebar div:hover{
background:#eaeaea;
}

#list div{
border-bottom:1px solid #ddd;
padding-bottom:6px;
}

#list div:hover{
background:#eee;
}

</style>

</head>


<body>

<div id="container">

<div id="sidebar">
<h3>Laestadiuksen saarnat</h3>
<input id="search" placeholder="Hae saarnasta..." style="width:100%;padding:6px;margin-bottom:10px;">

<div id="resultCount"></div>
<div id="list"></div>
<div style="font-size:12px;color:#666;margin-bottom:8px">
katkaisu: *
</div>
</div>

<div id="content">
<h2 id="title"></h2>
<div id="text"></div>
</div>

</div>


<script>

let sermons=[];

fetch("data/lll_sermons.json")
.then(r=>r.json())
.then(data=>{
    sermons=data;
    buildList();
    showSermon(1);
});

function buildList(){

    let sidebar=document.getElementById("list");
    sidebar.innerHTML="";

    sermons.forEach(s=>{

        let div=document.createElement("div");

        div.textContent=s.id+" "+cleanTitle(s.title);

        div.style.cursor="pointer";
        div.style.padding="4px";

        div.onclick=()=>showSermon(s.id);

        sidebar.appendChild(div);

    });

}

function showSermon(id){

let s = sermons.find(x => x.id == id);

document.getElementById("title").textContent = cleanTitle(s.title);

let txt = s.text;

let q = document.getElementById("search").value.toLowerCase().trim();

if(q !== ""){

let phraseMatch = q.match(/"(.*?)"/);

if(phraseMatch){

let phrase = phraseMatch[1];

let re = new RegExp(phrase,"gi");

txt = txt.replace(re,"<mark>$&</mark>");

}
else{

let words = q.split(/\s+/);

words.forEach(function(w,i){

let pattern = "\\b" + w.replace(/\*/g,"\\w*");

let re = new RegExp(pattern,"gi");

if(i===0){
txt = txt.replace(re,"<mark>$&</mark>");
}
else{
txt = txt.replace(re,"<mark class='m2'>$&</mark>");
}

});

}

}

document.getElementById("text").innerHTML = txt;

}
function cleanTitle(t){
    return t.replace(/^\d+\.\s*/,"");
}

document.getElementById("search").addEventListener("input", function(){

let q=this.value.toLowerCase().trim();

if(q===""){
buildList();
document.getElementById("resultCount").textContent=
sermons.length+" saarnaa";
return;
}

/* tarkista onko fraasi */

let phraseMatch=q.match(/"(.*?)"/);

let words;

if(phraseMatch){

words=[phraseMatch[1]];

}
else{

words=q.split(/\s+/);

}

let filtered=sermons.filter(function(s){

let text=(s.title+" "+s.text).toLowerCase();

return words.every(function(w){

let pattern="\\b"+w.replace(/\*/g,"\\w*");

let re=new RegExp(pattern,"i");

return re.test(text);

});

});

document.getElementById("resultCount").textContent=
filtered.length+" osumaa";

buildFilteredList(filtered);

});

function makeSnippet(text,words){

let lower=text.toLowerCase();

for(let w of words){

let pattern="\\b"+w.replace(/\*/g,"\\w*");

let re=new RegExp(pattern,"i");

let m=lower.match(re);

if(m){

let pos=m.index;

let start=Math.max(0,pos-60);
let end=Math.min(text.length,pos+120);

let snippet=text.substring(start,end);

snippet="…"+snippet+"…";

snippet=snippet.replace(re,"<mark>$&</mark>");

return snippet;

}

}

return text.substring(0,120)+"…";

}

function buildFilteredList(arr){

let sidebar=document.getElementById("list");

sidebar.innerHTML="";

let q=document.getElementById("search").value.toLowerCase().trim();

let words=q.split(/\s+/);

arr.forEach(function(s){

let div=document.createElement("div");

div.style.cursor="pointer";
div.style.padding="6px";
div.style.marginBottom="8px";

let title=s.id+" "+cleanTitle(s.title);

let snippet=makeSnippet(s.text,words);

div.innerHTML="<b>"+title+"</b><br><span style='font-size:12px;color:#555'>"+snippet+"</span>";

div.onclick=function(){showSermon(s.id)};

sidebar.appendChild(div);

});

}

</script>


</body>
</html>
