<!DOCTYPE html>
<html lang="fi">

<head>

<meta charset="UTF-8">
<title>OPPILUOLA</title>


<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">

  
<style>

/* YLEISET */

body{
margin:0;
font-family:'Orbitron', sans-serif;
color:white;
text-align:center;
height:100vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* LUOLAVIDEO MÄÄRITTELY */
#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.title{

position:absolute;
top:8%;
left:50%;
transform:translateX(-50%);

font-family:'Uncial Antiqua', serif;

font-size:60px;

letter-spacing:6px;

color:#d8c48f;

text-shadow:
0 2px 3px rgba(0,0,0,0.8),
0 6px 12px rgba(0,0,0,0.6),
0 0 6px rgba(255,220,140,0.25);

animation:torch 4.5s infinite ease-in-out;

}

.title span{

display:inline-block;
animation:float 4s ease-in-out infinite;

}

.title span:nth-child(2){animation-delay:0.2s}
.title span:nth-child(3){animation-delay:0.4s}
.title span:nth-child(4){animation-delay:0.6s}
.title span:nth-child(5){animation-delay:0.8s}
.title span:nth-child(6){animation-delay:1s}
.title span:nth-child(7){animation-delay:1.2s}
.title span:nth-child(8){animation-delay:1.4s}
.title span:nth-child(9){animation-delay:1.6s}

@keyframes torch{

0%{text-shadow:
0 2px 3px rgba(0,0,0,0.8),
0 6px 12px rgba(0,0,0,0.6),
0 0 6px rgba(255,220,140,0.2);}

50%{text-shadow:
0 2px 3px rgba(0,0,0,0.8),
0 6px 12px rgba(0,0,0,0.6),
0 0 12px rgba(255,200,120,0.35);}

100%{text-shadow:
0 2px 3px rgba(0,0,0,0.8),
0 6px 12px rgba(0,0,0,0.6),
0 0 6px rgba(255,220,140,0.2);}

}
  
@keyframes float{

0%{transform:translateY(0px)}

50%{transform:translateY(-8px)}

100%{transform:translateY(0px)}

}


  
/* OTSIKKO */

h1{
font-size:60px;
text-shadow:0 0 25px #00ffff;
margin-bottom:60px;
}

/* AARTEET ELI LINKIT */

.scroll{
top:68%;
right:8%;
transform:rotate(14deg);
}

.sword{
bottom:6%;
left:15%;
transform-origin:70% 80%;
transform:rotate(-54deg);
}

.sword img{
width:100px;

.sword:hover{
transform:rotate(-54deg) scale(1.06);
}

.sword:hover img{

filter:
brightness(1.1)
drop-shadow(0 0 18px rgba(255,220,120,0.7))
drop-shadow(0 20px 14px rgba(0,0,0,0.7));

}

filter:
brightness(0.9)
drop-shadow(0 22px 14px rgba(0,0,0,0.7));
}

.scroll img{

filter:
drop-shadow(0 14px 10px rgba(0,0,0,0.6))
drop-shadow(0 4px 4px rgba(0,0,0,0.5));

filter:
brightness(0.9)
drop-shadow(0 14px 10px rgba(0,0,0,0.6))
drop-shadow(0 4px 4px rgba(0,0,0,0.5));

}

.scroll:hover{

transform:rotate(14deg) scale(1.06);

}
  
.abacus{

bottom:6%;
left:40%;

}

.abacus img{

filter:
drop-shadow(0 14px 10px rgba(0,0,0,0.6))
drop-shadow(0 4px 4px rgba(0,0,0,0.5));
transform:rotate(-12deg);
filter:brightness(0.9) drop-shadow(0 14px 10px rgba(0,0,0,0.7));

}

.treasure{

position:absolute;

width:220px;

cursor:pointer;

transition:0.3s;
filter: drop-shadow(0 15px 12px rgba(0,0,0,0.7));

}

.treasure img{
width:100%;
display:block;
}

.treasure:hover{

transform:scale(1.06);

filter:drop-shadow(0 0 20px rgba(255,220,120,0.6));

}


/* HEHKU LUOLAAN */
h1{
font-size:60px;
text-shadow:
0 0 10px #00ffff,
0 0 25px #00ffff,
0 0 50px #00ffff;
margin-bottom:60px;
}

/* MOBIILI */

@media(max-width:700px){

h1{
font-size:36px;
}

.room{
width:160px;
height:90px;
font-size:18px;
}

}

</style>

</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="luolatausta.mp4" type="video/mp4">
</video>

<div class="overlay"></div>


<h1 class="title">
<span>O</span>
<span>P</span>
<span>P</span>
<span>I</span>
<span>L</span>
<span>U</span>
<span>O</span>
<span>L</span>
<span>A</span>
</h1>


<a href="kertotaulu.html" class="treasure abacus">
<img src="helmitaulu.png">
</a>

<a href="duel.html" class="treasure sword">
<img src="miekka.png">
</a>

<a href="sanakko.html" class="treasure scroll">
<img src="kaaro.png">
</a>



<audio id="music" src="tausta.wav" loop></audio>

<script>

/* Taustamusiikki käynnistyy ensimmäisestä klikkauksesta */

document.body.addEventListener("pointerdown",()=>{

const music=document.getElementById("music")

music.volume=0.35

music.play().catch(()=>{})

},{once:true})


/* Service Worker */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/sw.js")
}

</script>

</body>
</html>
