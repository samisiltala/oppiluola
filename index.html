<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2B Matematiikka Arcade</title>

<style>
#stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}
body {
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:black;
    color:#00ffff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

h1 {
    font-size:70px;
    margin-bottom:60px;
    text-shadow:0 0 20px #00ffff;
}

.menu {
    display:flex;
    flex-direction:column;
    gap:40px;
}

a {
    font-size:40px;
    padding:20px 70px;
    border-radius:15px;
    text-decoration:none;
    color:black;
    background:#00ffff;
    box-shadow:0 0 20px #00ffff;
    transition:0.2s;
}

a:hover {
    transform:scale(1.1);
    box-shadow:0 0 40px #00ffff;
}
</style>
</head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<body>
<canvas id="stars"></canvas>
    
<h1>🎮 2B Matematiikka Arcade</h1>

<div class="menu">
    <a href="duel.html">⚔ Kaksinpeli Duel</a>
    <a href="kertotaulu.html">🧮 Yksinpeli</a>
</div>
    
<audio id="bgMusic" src="tausta.wav" loop></audio>
    
<script>
let musicStarted = false;

function startMusic(){
    if(!musicStarted){
        let music = document.getElementById("bgMusic");
        music.volume = 0.4;   // ei liian kovalle
        music.play().catch(()=>{});
        musicStarted = true;
    }
}

document.addEventListener("click", startMusic);
// ---- TÄHTISATE ----

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<150;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        size: Math.random()*2,
        speed: Math.random()*0.5+0.2
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";

    stars.forEach(star=>{
        ctx.beginPath();
        ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
        ctx.fill();

        star.y += star.speed;

        if(star.y > canvas.height){
            star.y = 0;
            star.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(drawStars);
}

drawStars();

</script>    
</body>
</html>
