<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Oppiluola</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
background:black;
}

/* LUOLATAUSTA */

.background{
position:fixed;
width:100%;
height:100%;
background-image:url("luola.png");
background-size:cover;
background-position:center;
z-index:-3;
}

/* SUMU */

.fog{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 70%);
animation:fogmove 40s linear infinite;
z-index:-2;
}

@keyframes fogmove{
from{transform:translateX(-10%) translateY(-10%)}
to{transform:translateX(10%) translateY(10%)}
}

/* TÄHDET */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* OTSIKKO */

h1{
margin-top:50px;
font-size:60px;
text-shadow:0 0 25px #00ffff;
}

/* SOIHTU */

.torch{
font-size:42px;
animation:flicker 1.5s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.15)}
}

/* PELI-OVET */

.rooms{
margin-top:60px;

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
}

.room{

width:200px;
height:140px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:rgba(0,0,0,0.55);
border-radius:20px;

font-size:24px;

text-decoration:none;
color:white;

box-shadow:0 0 20px rgba(0,255,255,0.6);

transition:0.25s;
}

.room:hover{
transform:scale(1.1);
box-shadow:0 0 35px #00ffff;
}

/* LUKITTU */

.locked{
opacity:0.35;
}

/* MOBIILI */

@media(max-width:700px){

h1{font-size:36px;}

.room{
width:150px;
height:110px;
font-size:18px;
}

}

</style>
</head>

<body>

<div class="background"></div>
<div class="fog"></div>

<h1>🕯️ Oppiluola</h1>
<div class="torch">🔥</div>

<div class="rooms">

<a href="kertotaulu.html" class="room">
🧮
Kertotaululuola
</a>

<a href="duel/index.html" class="room">
⚔️
Kaksintaistelu
</a>

<a href="sanapeli.html" class="room">
🔤
Sanaluola
</a>

<div class="room locked">
⭐
Tulossa
</div>

</div>

<audio id="music" src="tausta.wav" loop></audio>

<script>

/* MUSIIKKI (käynnistyy ensimmäisestä klikkauksesta) */

document.body.addEventListener("click",()=>{

let music=document.getElementById("music")

music.volume=0.35

music.play().catch(()=>{})

},{once:true})


/* TÄHTITAIVAS */

for(let i=0;i<120;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

star.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(star)

}

/* SERVICE WORKER */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/sw.js")
}

</script>

</body>
</html>
