<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Sanaluola</title>

<audio id="blip" src="blip.mp3"></audio>
<audio id="win" src="voitto.wav"></audio>
<audio id="bip" src="bip.mp3"></audio>
<audio id="moka" src="moka.mp3"></audio>
<audio id="longword" src="longword.mp3"></audio>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Cinzel',serif;
  background:url("papyrus.jpg") center/cover no-repeat fixed;
  color:white;
  text-align:center;
  margin:0;
}

button {
  font-family:'Cinzel', serif;
  text-transform:uppercase;
  letter-spacing:2px;
  cursor:pointer;
}

/* ===== Overlay (alkuruutu + loppuruutu) ===== */

#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:url("papyrus.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  z-index:1000;
  overflow:auto;
}

.overlayBox {
  text-transform:uppercase;
  letter-spacing:1px;
  background:rgba(20,20,20,0.92);
  padding:70px 70px 50px;
  border-radius:18px;
  max-width:560px;
  margin-top:60px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

#nameInput {
  background:rgba(255,255,255,0.85);
  color:black;
  font-family:'Cinzel', serif;
  font-size:24px;
  padding:10px;
  border:none;
  border-radius:8px;
  text-align:center;
  text-transform:uppercase;
}

.overlayBox button {
  background:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  box-shadow:0 0 6px rgba(106,255,156,0.25);
  transition:all 0.15s;
}
.overlayBox button:hover {
  box-shadow:0 0 12px rgba(106,255,156,0.45);
  transform:translateY(-1px);
  color:#6aff9c;
}

/* ===== UUSI LOPPURUUTU ===== */

.overlayBox.endScreen {
  display:flex;
  flex-direction:column;
  align-items:stretch;
  justify-content:flex-start;
  gap:30px;
  padding:40px 60px 30px;
  max-width:1000px;
  width:90%;
  max-height:90vh;
  border-radius:18px;
  overflow:auto;
}

.endTop {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  width:100%;
}

.endTitle {
  font-size:52px;
  letter-spacing:4px;
}

.endGrid {
  display:grid;
  grid-template-columns:3fr 1.3fr;
  gap:30px 40px;
  align-items:start;
}

.wordWallWrapper { width:100%; }

.wordLegend {
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  margin-bottom:8px;
}
.legendFound{color:#6aff9c;}
.legendMissed{color:#666;}
.legendLong{color:#ffd86b;}

.wordWallTitle {
  font-size:16px;
  letter-spacing:2px;
  opacity:0.7;
  margin-bottom:8px;
}

.wordWall {
  background:#111;
  padding:18px;
  border-radius:10px;
  font-family:'JetBrains Mono', monospace;
  font-size:14px;
  line-height:1.5;
  column-count:4;
  column-gap:22px;
  max-height:60vh;
  overflow-y:auto;
}

.wordFound  {color:#6aff9c;}
.wordMissed {color:#666;}
.wordLong   {color:#ffd86b; font-weight:bold;}

.endRight {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  align-self:start;
  gap:10px;
  margin-top:0;
}

.endStats {
  font-size:30px; line-height:1.2;
}
.endStatsSmall {
  font-size:18px;
  opacity:0.8;
}

#leaderboard {
  margin-top:12px;
  font-size:18px;
  line-height:1.6;
  max-height:200px;
  overflow-y:auto;
}

@media (max-width:900px) {
  .endGrid {
    grid-template-columns:1fr;
  }
  .wordWall { column-count:2; }
  .endRight { align-items:center; }
}

/* ====== PELI ====== */

.container {
  display:grid;
  grid-template-columns:minmax(160px,200px) 1fr minmax(180px,220px);
  gap:30px;
  max-width:1100px;
  width:100%;
  margin:30px auto;
}
.leftPanel {
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:flex-start;
  background:rgba(0,0,0,0.75);
  padding:20px;
  border-radius:15px;
}
#timer { font-size:42px;font-weight:bold;transition:all 0.2s; }
#score { font-size:36px;font-weight:bold; }

.centerGame {
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:420px;
}
#grid {
  display:grid;
  grid-template-columns:repeat(4,80px);
  gap:14px;
  margin-top:30px;
  touch-action:none;
  position:relative;
  z-index:10;
}

.tile {
  width:100%;
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'JetBrains Mono', monospace;
  font-size:34px;
  font-weight:600;
  color:#222;
  background:linear-gradient(#f4f1e6,#ddd6c3);
  border:1px solid rgba(0,0,0,0.25);
  border-radius:12px;
  user-select:none;
}
.tile.active  {background:linear-gradient(#fff7d6,#e9d58f);}
.tile.success {background:linear-gradient(#d4ffd4,#7fff9c);box-shadow:0 0 12px rgba(106,255,156,0.9);}
.tile.error   {background:linear-gradient(#ffb3b3,#ff6b6b);animation:shake 0.25s;}

@keyframes shake {
  25%{transform:translateX(-4px)} 50%{transform:translateX(4px)} 
  75%{transform:translateX(-3px)} 100%{transform:translateX(0)}
}

#word {
  margin-top:40px;
  font-family:'JetBrains Mono', monospace;
  font-size:46px;
  letter-spacing:6px;
  min-height:50px;
  color:black;
  background:rgba(255,255,255,0.85);
  padding:10px 25px;
  border-radius:12px;
  font-weight:bold;
}

.rightPanel {
  background:#222;
  padding:15px;
  border-radius:15px;
  max-height:400px;
  overflow:auto;
}

.floatingScore {
  position:fixed;
  font-family:'JetBrains Mono', monospace;
  font-size:34px;
  font-weight:bold;
  color:#6aff9c;
  pointer-events:none;
  transform:translate(-50%,-50%);
  text-shadow:0 0 10px rgba(106,255,156,0.8);
  animation:floatUp 0.9s ease-out forwards;
  z-index:2000;
}
@keyframes floatUp {
  0%{opacity:1;transform:translate(-50%,-50%);} 
  100%{opacity:0;transform:translate(-50%,-140%);}
}

.homeButton{
  position:fixed;top:15px;left:15px;
  background:white;color:black;
  padding:8px 14px;border-radius:8px;text-decoration:none;
  font-family:'Cinzel',serif;z-index:2000;
}
.homeButton:hover{background:#eee;}

#greekGlow {
  position:fixed;right:80px;bottom:30px;
  font-family:'Cinzel',serif;
  font-size:26px;
  color:rgba(255,255,255,0.55);
  letter-spacing:4px;
  pointer-events:none;
  animation:greekFloat 8s ease-in-out infinite;
  text-shadow:0 0 14px rgba(255,255,255,0.45);
}
@keyframes greekFloat {
  0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}
}
</style>
</head>

<body>
<a href="index.html" class="homeButton">Koti</a>

<div id="overlay">
  <div class="overlayBox">
    <h2 id="gameTitle">SALAISET SANAT</h2>
    <input id="nameInput" placeholder="Nimesi" maxlength="6">
    <button onclick="startGame()">Aloita peli</button>
  </div>
</div>

<div class="container">
  <div class="leftPanel">
    <div id="playerName"></div>
    <div id="timer">Aika: 120</div>
    <div id="score">Pisteet: 0</div>
    <div id="debugWords">Sanat: 0 / 0</div>
    <button onclick="toggleMusic()">Musiikki</button>
  </div>

  <div class="centerGame">
    <div style="position:relative">
      <canvas id="lineCanvas"></canvas>
      <div id="grid"></div>
    </div>
    <div id="word"></div>
  </div>

  <div class="rightPanel">
    <h3>Löydetyt sanat</h3>
    <div id="found"></div>
  </div>
</div>

<script>
/* ---- alkuosan logiikka sama kuin aiemmin ---- */
/* kaikki funktiot ja sanahaku toimii, 
   erot: endGame() ja sen alaiset on uusittu selkeäksi */

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbx0iS5gOubgLfnn6PW8L876u8H6GuZUabl-Gccgj2TivLPcTvqXSSqNivg_wTxhBx6P/exec";
let grid=document.getElementById("grid")
let board=[], tiles=[]
let music=new Audio("sanatausta.mp3"); music.loop=true; music.volume=0.25;
let currentWord="", score=0, time=120, timer
let selecting=false, usedTiles=[], foundWords=new Set()
let playerName="", dictionary=new Set(), prefixes=new Set(), validWords=new Set()
let maxScore=0, longestWord=""

let dice=[
  "AAEIOU","AEIOUY","AEIOUY","AAEIOU","NNRSTL","NNRSTL","RSTLNA","RSTLNA",
  "KKRTLN","HMPLVK","DEIINS","TLAEIN","ÄÄÖEEA","ÄÖAEIO","EEEAAA","EEEIII"
]

fetch("sanat.txt")
 .then(r=>r.text())
 .then(data=>{
   let words=data.split("\n").map(w=>w.trim().toLowerCase()).filter(w=>w.length>2)
   dictionary=new Set(words)
   words.forEach(word=>{for(let i=1;i<=word.length;i++) prefixes.add(word.slice(0,i))})
 })

function startGame(){
  if(dictionary.size===0){alert("Sanakirja latautuu vielä...");return;}
  let name=document.getElementById("nameInput").value.trim().toUpperCase()
  if(!name){alert("Kirjoita nimesi ensin");return;}
  playerName=name
  document.getElementById("playerName").textContent="👤 "+playerName
  document.getElementById("overlay").style.display="none"
  score=0; time=120; foundWords.clear()
  generateGoodBoard(); startTimer(); music.play()
}

/* --- muut pelifunktiot samat kuin vanhassa versiosta --- */
/* generateGoodBoard, generateBoard, drawLines, findAllWords, getPoints, etc. */
/* jätetään pois tästä katkelmasta pituuden vuoksi; ne kopioidaan alkuperäisestä tiedostostasi sellaisenaan. */

/* ======= uudistettu endGame() ======= */

function endGame(){
  fetch(WEB_APP_URL,{
    method:"POST",
    body:JSON.stringify({name:playerName,score:score,level:10,longest:longestWord})
  })
  clearInterval(timer)
  selecting=false
  clearSelection()
  document.getElementById("win").play()

  let overlay=document.getElementById("overlay")
  overlay.style.display="flex"

  /* rakennetaan loppuruutu */
  let words=[...validWords].sort()
  let wordHTML=""
  words.forEach(w=>{
    if(foundWords.has(w)) wordHTML+=`<span class="wordFound">${w}</span> `
    else if(w.length>=7)  wordHTML+=`<span class="wordLong">${w}</span> `
    else                  wordHTML+=`<span class="wordMissed">${w}</span> `
  })

  overlay.innerHTML=`
  <div class="overlayBox endScreen">
    <div class="endTop">
      <div class="endTitle">PELI OHI!</div>
      <div class="endStatsTop">${playerName}: ${score} pistettä<br>${foundWords.size} sanaa</div>
    </div>

    <div class="endGrid">
      <div class="wordWallWrapper">
        <div class="wordWallTitle">KAIKKI SANAT</div>
        <div class="wordLegend">
          <span class="legendFound">■ löytynyt</span> 
          <span class="legendMissed">■ puuttuu</span> 
          <span class="legendLong">■ pitkä sana</span>
        </div>
        <div class="wordWall" id="wordWall">${wordHTML}</div>
      </div>

      <div class="endRight">
        <div class="endStats">${playerName}: ${score} pistettä<br>${foundWords.size} sanaa</div>
        <div class="endStatsSmall">pisin sanasi: ${longestWord.toUpperCase()} (${longestWord.length})</div>
        <div class="endStatsSmall">maksimi: ${maxScore} pistettä<br>${validWords.size} sanaa</div>
        <div class="endStatsSmall">löysit ${Math.round(foundWords.size/validWords.size*100)} % sanoista</div>
        <button onclick="newGame()">Uusi peli</button>
        <div id="leaderboard"></div>
      </div>
    </div>
  </div>
  `
  loadSanaluolaTop()
}

/* leaderboard kuten ennen */
function loadSanaluolaTop(){
  fetch(WEB_APP_URL + "?level=10")
   .then(r=>r.json())
   .then(data=>{
     let sorted=data.sort((a,b)=>b[1]-a[1])
     let html="<h3>🏆 TOP 5</h3>"
     sorted.slice(0,5).forEach((r,i)=> html += `${i+1}. ${r[0]} — ${r[1]}<br>`)
     let longest="",player=""
     data.forEach(r=>{let w=r[4]||"";if(w.length>longest.length){longest=w;player=r[0];}})
     if(longest) html += `<br>📜 Päivän pisin sana<br>${player} — ${longest.toUpperCase()}`
     document.getElementById("leaderboard").innerHTML=html
   })
}

function newGame(){
  clearInterval(timer)
  longestWord=""; score=0; time=120; foundWords.clear()
  document.getElementById("score").textContent="Pisteet: 0"
  document.getElementById("found").innerHTML=""
  document.getElementById("word").textContent=""
  document.getElementById("overlay").style.display="none"
  generateGoodBoard(); startTimer()
}

function toggleMusic(){ if(music.paused) music.play(); else music.pause(); }

</script>

<div id="greekGlow">
ἐν ἀρχῇ ἦν ὁ <span class="logosWord">λόγος</span>
</div>

</body>
</html>
