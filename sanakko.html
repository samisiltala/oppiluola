<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sanaluola</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:10px;
justify-content:center;
margin-top:30px;
}

.tile{
width:80px;
height:80px;
background:#222;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
cursor:pointer;
user-select:none;
}

.tile.active{
background:#00aaff;
}

#word{
margin-top:20px;
font-size:28px;
}

#score{
margin-top:10px;
font-size:20px;
}

#found{
margin-top:20px;
max-width:400px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

</style>
</head>

<body>

<h1>🔤 Sanaluola</h1>

<div id="timer">Aika: 120</div>

<div id="grid"></div>

<div id="word"></div>

<div id="score">Pisteet: 0</div>

<div id="found"></div>

<script>

let letters =
"AAAAAAEEEEEEIIIIOOOUUYYÄÄÖTTTNNNSSLLKKRRMPVHJD"

let grid = document.getElementById("grid")

let dictionary = new Set()

let currentWord = ""
let score = 0
let foundWords = new Set()

let selecting = false
let usedTiles = []

/* SANALISTA */

fetch("sanat.txt")
.then(r=>r.text())
.then(data=>{

let words = data.split("\n")
.map(w=>w.trim().toLowerCase())
.filter(w=>w.length>2)

dictionary = new Set(words)

console.log("Sanoja:",dictionary.size)

})

/* RUUDUKKO */

function randomLetter(){
return letters[Math.floor(Math.random()*letters.length)]
}

let tiles=[]

for(let i=0;i<16;i++){

let div=document.createElement("div")
div.className="tile"
div.textContent=randomLetter()

grid.appendChild(div)
tiles.push(div)

}

/* POINTER EVENTS */

grid.addEventListener("pointerdown",e=>{

if(!e.target.classList.contains("tile"))return

selecting=true
addTile(e.target)

})

grid.addEventListener("pointermove",e=>{

if(!selecting)return

let el=document.elementFromPoint(e.clientX,e.clientY)

if(el && el.classList.contains("tile")){
addTile(el)
}

})

window.addEventListener("pointerup",()=>{

if(!selecting)return

selecting=false
checkWord()

clearSelection()

})

function addTile(tile){

if(usedTiles.includes(tile))return

tile.classList.add("active")

usedTiles.push(tile)

currentWord+=tile.textContent

document.getElementById("word").textContent=currentWord

}

/* TARKISTUS */

function checkWord(){

let w=currentWord.toLowerCase()

if(dictionary.has(w) && !foundWords.has(w)){

foundWords.add(w)

let pts=w.length-2

score+=pts

document.getElementById("score").textContent="Pisteet: "+score

let div=document.createElement("div")
div.textContent=w

document.getElementById("found").appendChild(div)

}

}

/* NOLLAUS */

function clearSelection(){

usedTiles.forEach(t=>t.classList.remove("active"))

usedTiles=[]
currentWord=""

document.getElementById("word").textContent=""

}

/* TIMER */

let time=120

let timer=setInterval(()=>{

time--

document.getElementById("timer").textContent="Aika: "+time

if(time<=0){

clearInterval(timer)

alert("Peli ohi! Pisteet: "+score)

}

},1000)

</script>

</body>
</html>
