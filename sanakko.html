<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sanaluola</title>

<audio id="blip" src="blip.mp3"></audio>
<audio id="win" src="voitto.wav"></audio>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Orbitron',sans-serif;
background:111;
color:white;
text-align:center;
}

.container{
display:grid;
grid-template-columns:200px 1fr 220px;
gap:30px;
max-width:1000px;
margin:30px auto;
}

.leftPanel{
display:flex;
flex-direction:column;
gap:20px;
align-items:flex-start;
}

#timer{
font-size:42px;
font-weight:bold;
}

#score{
font-size:36px;
font-weight:bold;
}

.centerGame{
display:flex;
flex-direction:column;
align-items:center;
}

#grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:14px;
margin-top:30px;
}

#overlay h2{
font-size:56px;
margin-bottom:10px;
}
.tile{
width:80px;
height:80px;
background:#222;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
cursor:pointer;
user-select:none;
}

.tile.active{
background:#00aaff;
transform:scale(1.15);
}

.rightPanel{
background:#222;
padding:15px;
border-radius:15px;
max-height:400px;
overflow:auto;
}

#found div{
padding:4px 0;
border-bottom:1px solid #444;
}

.homeButton{
position:fixed;
top:15px;
left:15px;
background:#00ffff;
color:black;
padding:8px 14px;
border-radius:10px;
text-decoration:none;
}

button{
font-family:'Orbitron';
font-size:32px;
padding:22px 48px;
border:none;
border-radius:15px;
background:#00ffff;
cursor:pointer;
box-shadow:0 0 20px #00ffff;
}

#nameInput{
font-family:'Orbitron',sans-serif;
font-size:30px;
padding:14px 18px;
border-radius:10px;
border:none;
text-align:center;
width:240px;
}
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
z-index:1000;
}
#word{
margin-top:55px;
font-size:44px;
letter-spacing:3px;
min-height:50px;
text-shadow:0 0 12px #00ffff;
}
</style>
</head>

<body>

<a href="index.html" class="homeButton">🏠 Koti</a>

<div id="overlay">
<h2>🔤 Sanaluola</h2>
<input id="nameInput" placeholder="Nimesi" onkeydown="if(event.key==='Enter')startGame()">
<button onclick="startGame()">🎮 Aloita peli</button>
<div id="leaderboard"></div>
</div>

<div class="container">

<div class="leftPanel">
<div id="playerName"></div>
<div id="timer">Aika: 120</div>
<div id="score">Pisteet: 0</div>
<button onclick="toggleMusic()">🎵 Musiikki</button>
</div>

<div class="centerGame">
<div id="grid"></div>
<div id="word"></div>
</div>

<div class="rightPanel">
<h3>Löydetyt sanat</h3>
<div id="found"></div>
</div>

</div>

<script>

let grid=document.getElementById("grid")

let board=[]
let tiles=[]

let currentWord=""
let score=0
let time=120
let timer

let selecting=false
let usedTiles=[]

let playerName=""

let dictionary=new Set()

let dice=[
"AAEIOU","AAEIOU","AEIOUY","AEIOUY",
"ÄÄÖEEA","ÄÖAEIO","EEEAAA","EEEIII",
"IIIOOO","IOOUUY","NNNRST","NNRSTL",
"RSTLNA","STLNRK","KKRTLN","HMPLVK"
]

fetch("sanat.txt")
.then(r=>r.text())
.then(data=>{

let words=data.split("\n")
.map(w=>w.trim().toLowerCase())
.filter(w=>w.length>2)

dictionary=new Set(words)

})

function startGame(){

playerName=document.getElementById("nameInput").value || "Pelaaja"
document.getElementById("playerName").textContent="👤 "+playerName

document.getElementById("overlay").style.display="none"

score=0
time=120

document.getElementById("score").textContent="Pisteet: 0"
document.getElementById("found").innerHTML=""

generateBoard()

startTimer()

}

function startTimer(){

clearInterval(timer)

timer=setInterval(()=>{

time--

document.getElementById("timer").textContent="Aika: "+time

if(time<=0) endGame()

},1000)

}

function generateBoard(){

grid.innerHTML=""
tiles=[]
board=[]

let shuffled=[...dice].sort(()=>Math.random()-0.5)

for(let i=0;i<16;i++){

let die=shuffled[i]
let letter=die[Math.floor(Math.random()*6)]

board.push(letter)

let div=document.createElement("div")
div.className="tile"
div.textContent=letter

div.dataset.x=i%4
div.dataset.y=Math.floor(i/4)

grid.appendChild(div)
tiles.push(div)

}

}

function isNeighbor(tile){

if(usedTiles.length===0) return true

let last=usedTiles[usedTiles.length-1]

let x1=Number(last.dataset.x)
let y1=Number(last.dataset.y)

let x2=Number(tile.dataset.x)
let y2=Number(tile.dataset.y)

return Math.abs(x1-x2)<=1 && Math.abs(y1-y2)<=1

}

function getNearbyTile(x,y){

let candidates=[]

if(usedTiles.length===0){

candidates=tiles

}else{

let last=usedTiles[usedTiles.length-1]

let lx=Number(last.dataset.x)
let ly=Number(last.dataset.y)

tiles.forEach(tile=>{

let tx=Number(tile.dataset.x)
let ty=Number(tile.dataset.y)

if(Math.abs(tx-lx)<=1 && Math.abs(ty-ly)<=1){
candidates.push(tile)
}

})

}

let closest=null
let minDist=9999

candidates.forEach(tile=>{

let rect=tile.getBoundingClientRect()

let cx=rect.left+rect.width/2
let cy=rect.top+rect.height/2

let dx=cx-x
let dy=cy-y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<minDist){
minDist=dist
closest=tile
}

})

if(minDist<200) return closest
return null

}

grid.addEventListener("pointerdown",e=>{

if(!e.target.classList.contains("tile"))return

selecting=true

grid.setPointerCapture(e.pointerId)

addTile(e.target)

})

grid.addEventListener("pointermove",e=>{

if(!selecting)return

let tile=getNearbyTile(e.clientX,e.clientY)

if(tile && tile!==usedTiles[usedTiles.length-1]){
addTile(tile)
}

})

window.addEventListener("pointerup",e=>{

if(!selecting)return

selecting=false

grid.releasePointerCapture(e.pointerId)

checkWord()

clearSelection()

})

function addTile(tile){

if(usedTiles.includes(tile)) return
if(!isNeighbor(tile)) return

tile.classList.add("active")

usedTiles.push(tile)

currentWord+=tile.textContent

document.getElementById("word").textContent=currentWord

}

function checkWord(){

let w=currentWord.toLowerCase()

if(dictionary.has(w)){

let pts=w.length-2

score+=pts

document.getElementById("score").textContent="Pisteet: "+score

let div=document.createElement("div")
div.textContent=w+" +"+pts
document.getElementById("found").prepend(div)

document.getElementById("blip").play()

}

}

function clearSelection(){

usedTiles.forEach(t=>t.classList.remove("active"))

usedTiles=[]
currentWord=""

document.getElementById("word").textContent=""

}

function endGame(){

clearInterval(timer)

document.getElementById("win").play()

saveScore()

let overlay=document.getElementById("overlay")

overlay.style.display="flex"

overlay.innerHTML=

"<h2>Peli ohi!</h2>"+
"<h3>"+playerName+": "+score+" pistettä</h3>"+
"<button onclick='startGame()'>🔁 Uusi peli</button>"+
"<a href='index.html'><button>🏠 Kotivalikko</button></a>"+
"<div id='leaderboard'></div>"

renderLeaderboard()

}

function saveScore(){

let scores=JSON.parse(localStorage.getItem("oppiluola_scores")||"[]")

scores.push({name:playerName,score:score})

scores.sort((a,b)=>b.score-a.score)

scores=scores.slice(0,5)

localStorage.setItem("oppiluola_scores",JSON.stringify(scores))

}

function renderLeaderboard(){

let scores=JSON.parse(localStorage.getItem("oppiluola_scores")||"[]")

let html="<h3>🏆 Top 5</h3>"

scores.forEach(s=>{
html+="<div>"+s.name+" — "+s.score+"</div>"
})

document.getElementById("leaderboard").innerHTML=html

}

renderLeaderboard()

function toggleMusic(){

let music=new Audio("sanatausta.mp3")

if(music.paused) music.play()
else music.pause()

}

</script>

</body>
</html>
