<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sanaluola</title>

<audio id="blip" src="blip.mp3"></audio>
<audio id="win" src="voitto.wav"></audio>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

  <style>
.container{
display:grid;
grid-template-columns:200px 1fr 220px;
gap:30px;
max-width:1000px;
margin:0 auto;
margin-top:30px;
}

.leftPanel{
font-size:22px;
}

.centerGame{
display:flex;
flex-direction:column;
align-items:center;
}

.rightPanel{
background:#222;
padding:15px;
border-radius:15px;
max-height:400px;
overflow:auto;
}

#found div{
padding:4px 0;
border-bottom:1px solid #444;
}
body{
font-family:'Orbitron', sans-serif;
background:#111;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#lineCanvas{
position:absolute;
left:0;
top:0;
pointer-events:none;
}
  
#grid{
position:relative;
display:grid;
grid-template-columns:repeat(4,80px);
gap:10px;
justify-content:center;
margin-top:30px;
}

.tile{
width:80px;
height:80px;
background:#222;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
cursor:pointer;
user-select:none;
touch-action:none;
}

.tile.active{
background:#00aaff;
}


#word{
margin-top:20px;
font-size:28px;
}

#score{
margin-top:10px;
font-size:20px;
}

#found{
margin-top:20px;
max-width:400px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

.homeButton{
position:fixed;
top:15px;
left:15px;
background:#00ffff;
color:black;
padding:8px 14px;
border-radius:10px;
text-decoration:none;
font-size:14px;
box-shadow:0 0 10px #00ffff;
}

.homeButton:hover{
transform:scale(1.05);
}

.tile{
width:80px;
height:80px;
background:#222;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
cursor:pointer;
user-select:none;

animation:pop 0.35s ease;
}
.tile:hover{
box-shadow:0 0 15px #00ffff;
}

@keyframes foundFlash{
0%{background:#00ff88; transform:scale(1)}
50%{background:#00ffff; transform:scale(1.2)}
100%{background:#222; transform:scale(1)}
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-40px);opacity:0;}
}

@keyframes comboPop{
0%{transform:translateX(-50%) scale(0.5);}
70%{transform:translateX(-50%) scale(1.3);}
100%{transform:translateX(-50%) scale(1);}
}
    
@keyframes pop{

0%{transform:scale(0)}
70%{transform:scale(1.2)}
100%{transform:scale(1)}

}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
z-index:1000;
}

#overlay button{
font-family:'Orbitron', sans-serif;
font-size:28px;
padding:20px 40px;
border:none;
border-radius:15px;
background:#00ffff;
cursor:pointer;
box-shadow:0 0 20px #00ffff;
}
</style>
</head>

<body>

<a href="index.html" class="homeButton">🏠 Koti</a>
<div id="overlay">

<h2>🔤 Sanaluola</h2>

<button onclick="startGame()">🎮 Aloita peli</button>

</div>

<div class="container">

<div class="leftPanel">
<div id="timer">Aika: 120</div>
<div id="score">Pisteet: 0</div>
<button onclick="toggleMusic()">🎵 Musiikki</button>
</div>

<div class="centerGame">
<div id="grid"></div>
<canvas id="lineCanvas"></canvas>
<div id="word"></div>
</div>


  
<div class="rightPanel">
<h3>Löydetyt sanat</h3>
<div id="found"></div>
</div>

</div>

<script>
let canvas = document.getElementById("lineCanvas")
let ctx = canvas.getContext("2d")
let prefixes = new Set()
let combo = 0
let comboTimer
let pointerX = 0
let pointerY = 0
  
let board=[]
let tiles=[]
let dice = [

"AAEIOU",
"AAEIOU",
"AEIOUY",
"AEIOUY",

"ÄÄÖEEA",
"ÄÖAEIO",
"EEEAAA",
"EEEIII",

"IIIOOO",
"IOOUUY",
"NNNRST",
"NNRSTL",

"RSTLNA",
"STLNRK",
"KKRTLN",
"HMPLVK"

]

let grid=document.getElementById("grid")

let dictionary=new Set()

let currentWord=""
let score=0
let foundWords=new Set()

let selecting=false
let usedTiles=[]

let timer
let time=120
let streak=0
let musicOn=true

let bgMusic=new Audio("sanatausta.mp3")
bgMusic.loop=true
bgMusic.volume=0.3

let blip=document.getElementById("blip")
let win=document.getElementById("win")
let longword=new Audio("longword.mp3")

/* SANALISTA */

fetch("sanat.txt")
.then(r=>r.text())
.then(data=>{

let words=data.split("\n")
.map(w=>w.trim().toLowerCase())
.filter(w=>w.length>2)

dictionary = new Set(words)

words.forEach(w=>{
for(let i=1;i<=w.length;i++){
prefixes.add(w.slice(0,i))
}
})

console.log("Sanoja:",dictionary.size)

})

/* CANVAS */

function resizeCanvas(){

let rect=grid.getBoundingClientRect()

canvas.width=rect.width
canvas.height=rect.height

canvas.style.left=rect.left+"px"
canvas.style.top=rect.top+"px"

}

resizeCanvas()
window.addEventListener("resize",resizeCanvas)

/* PELIN ALOITUS */

function startGame(){

document.getElementById("overlay").style.display="none"

score=0
time=120
streak=0

foundWords.clear()

document.getElementById("score").textContent="Pisteet: 0"
document.getElementById("found").innerHTML=""
document.getElementById("timer").textContent="Aika: 120"

generateGoodBoard()

if(musicOn){
bgMusic.currentTime=0
bgMusic.play().catch(()=>{})
}

startTimer()

}

/* TIMER */

function startTimer(){

clearInterval(timer)

timer=setInterval(()=>{

time--

document.getElementById("timer").textContent="Aika: "+time

if(time<=0){
endGame()
}

},1000)

}

/* RUUDUKKO */

function randomLetter(){
return letters[Math.floor(Math.random()*letters.length)]
}

function generateBoard(){

grid.innerHTML=""
tiles=[]
board=[]

let shuffled=[...dice].sort(()=>Math.random()-0.5)

for(let i=0;i<16;i++){

let die=shuffled[i]
let letter=die[Math.floor(Math.random()*6)]

board.push(letter)

let div=document.createElement("div")
div.className="tile"
div.textContent=letter

div.dataset.x=i%4
div.dataset.y=Math.floor(i/4)
div.textContent = w + "  +" + (pts * multiplier)
grid.appendChild(div)
tiles.push(div)

}

}

/* ETSI SANOJA */

function generateGoodBoard(){

let attempts=0

while(true){

generateBoard()

let words=findWords()

if(words>25) break

attempts++

if(attempts>200) break

}

}

function findWords(){

let found=0

function dfs(x,y,word,visited){

word+=board[y*4+x]

if(!prefixes.has(word.toLowerCase())) return

if(word.length>2 && dictionary.has(word.toLowerCase())){
found++
}

for(let dx=-1;dx<=1;dx++){
for(let dy=-1;dy<=1;dy++){

let nx=x+dx
let ny=y+dy

if(nx<0||ny<0||nx>=4||ny>=4) continue

let key=nx+"-"+ny
if(visited.has(key)) continue

let newVisited=new Set(visited)
newVisited.add(key)

dfs(nx,ny,word,newVisited)

}
}

}

for(let x=0;x<4;x++){
for(let y=0;y<4;y++){

let visited=new Set()
visited.add(x+"-"+y)

dfs(x,y,"",visited)

}
}

return found

}

/* COMBO-ANIMAATIO */
function showCombo(text){

let el = document.createElement("div")

el.innerText = text

el.style.position = "fixed"
el.style.top = "30%"
el.style.left = "50%"
el.style.transform = "translateX(-50%)"
el.style.fontSize = "50px"
el.style.color = "#ffcc00"
el.style.textShadow = "0 0 20px #ffcc00"
el.style.zIndex = "2000"
el.style.animation = "comboPop 1s ease"

document.body.appendChild(el)

setTimeout(()=>el.remove(),1000)

}

/* PISTEANIMAATIO */
  function showPoints(x,y,pts){

let el=document.createElement("div")

el.innerText="+"+pts

el.style.position="absolute"
el.style.left=x+"px"
el.style.top=y+"px"
el.style.color="#00ff88"
el.style.fontSize="28px"
el.style.fontWeight="bold"
el.style.pointerEvents="none"
el.style.animation="floatUp 1s ease"

document.body.appendChild(el)

setTimeout(()=>el.remove(),1000)

}
  
/* VIEREKKÄISYYS */

function isNeighbor(tile){

if(usedTiles.length===0) return true

let last=usedTiles[usedTiles.length-1]

let x1=Number(last.dataset.x)
let y1=Number(last.dataset.y)

let x2=Number(tile.dataset.x)
let y2=Number(tile.dataset.y)

return Math.abs(x1-x2)<=1 && Math.abs(y1-y2)<=1

}

/* VIIVA */

function drawLine(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(usedTiles.length === 0) return

ctx.strokeStyle="#00ffff"
ctx.lineWidth=8
ctx.lineCap="round"
ctx.shadowBlur=12
ctx.shadowColor="#00ffff"

ctx.beginPath()

let gridRect = grid.getBoundingClientRect()

for(let i=0;i<usedTiles.length;i++){

let rect = usedTiles[i].getBoundingClientRect()

let x = rect.left - gridRect.left + rect.width/2
let y = rect.top - gridRect.top + rect.height/2

if(i===0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

}

/* live pointer */

let px = pointerX - gridRect.left
let py = pointerY - gridRect.top

ctx.lineTo(px,py)

ctx.stroke()

}

/* POINTER */

grid.addEventListener("pointerdown",e=>{

if(!e.target.classList.contains("tile"))return

selecting=true
grid.setPointerCapture(e.pointerId)
addTile(e.target)

})

grid.addEventListener("pointermove", e => {

if(!selecting) return

pointerX = e.clientX
pointerY = e.clientY

let el = document.elementFromPoint(e.clientX, e.clientY)

if(el && el.classList.contains("tile")){
addTile(el)
}

drawLine()

let closest=null
let minDist=9999

tiles.forEach(tile=>{

let rect=tile.getBoundingClientRect()

let cx=rect.left+rect.width/2
let cy=rect.top+rect.height/2

let dx=cx-e.clientX
let dy=cy-e.clientY

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<minDist){
minDist=dist
closest=tile
}

})

if(closest && minDist<60){
addTile(closest)
}

})

window.addEventListener("pointerup",(e)=>{

if(!selecting)return

selecting=false
grid.releasePointerCapture(e.pointerId)
checkWord()

clearSelection()

})

function addTile(tile){

if(usedTiles.includes(tile)) return
if(!isNeighbor(tile)) return

tile.classList.add("active")

usedTiles.push(tile)

currentWord+=tile.textContent

document.getElementById("word").textContent=currentWord

drawLine()

}

/* SANA */

function checkWord(){

let w=currentWord.toLowerCase()

if(dictionary.has(w) && !foundWords.has(w)){

foundWords.add(w)

let div = document.createElement("div")
div.textContent = w
document.getElementById("found").prepend(div)

let pts=w.length-2

combo++
clearTimeout(comboTimer)

let multiplier = 1

if(combo >= 5){
multiplier = 3
showCombo("🔥 x3 COMBO")
}
else if(combo >= 3){
multiplier = 2
showCombo("⚡ x2 COMBO")
}

score += pts * multiplier
document.getElementById("score").textContent="Pisteet: "+score

comboTimer = setTimeout(()=>{
combo = 0
},2500)

/* VÄLÄHDYS */

usedTiles.forEach(t=>{
t.style.animation="foundFlash 0.4s ease"

setTimeout(()=>{
t.style.animation=""
},400)
})

/* ÄÄNET */

if(w.length>=5){
longword.currentTime=0
longword.play().catch(()=>{})
}
else{
blip.currentTime=0
blip.play().catch(()=>{})
}

/* COMBO */

if(streak>=3){
longword.currentTime=0
longword.play().catch(()=>{})
streak=0
}

}else{

streak=0

}

}

/* NOLLAUS */

function clearSelection(){

usedTiles.forEach(t=>t.classList.remove("active"))

usedTiles=[]
currentWord=""

document.getElementById("word").textContent=""

ctx.clearRect(0,0,canvas.width,canvas.height)

}

/* LOPPU */

function endGame(){

clearInterval(timer)

bgMusic.pause()

win.currentTime=0
win.play().catch(()=>{})

let overlay=document.getElementById("overlay")

overlay.style.display="flex"

overlay.innerHTML=
"<h2>Peli ohi!</h2>"+
"<h3>Pisteet: "+score+"</h3>"+
"<button onclick='startGame()'>🔁 Uusi peli</button>"

}

/* MUSIIKKI NAPPI */

function toggleMusic(){

musicOn=!musicOn

if(musicOn){
bgMusic.play().catch(()=>{})
}
else{
bgMusic.pause()
}

}

</script>

</body>
</html>
