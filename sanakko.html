<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sanaluola</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:10px;
justify-content:center;
margin-top:30px;
}

.tile{
width:80px;
height:80px;
background:#222;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
cursor:pointer;
user-select:none;
}

.tile.active{
background:#00aaff;
}

#word{
margin-top:20px;
font-size:28px;
}

#score{
margin-top:10px;
font-size:20px;
}

#found{
margin-top:20px;
max-width:400px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

</style>
</head>

<body>

<h1>đź”¤ Sanaluola</h1>

<div id="timer">Aika: 120</div>

<div id="grid"></div>

<div id="word"></div>

<div id="score">Pisteet: 0</div>

<div id="found"></div>

<script>
let board = []
let letters =
"AAAAAAEEEEEEIIIIOOOUUYYĂ„Ă„Ă–TTTNNNSSLLKKRRMPVHJD"

let grid = document.getElementById("grid")

let dictionary = new Set()

let currentWord = ""
let score = 0
let foundWords = new Set()

let selecting = false
let usedTiles = []

/* SANALISTA */

fetch("sanat.txt")
.then(r=>r.text())
.then(data=>{

let words = data.split("\n")
.map(w=>w.trim().toLowerCase())
.filter(w=>w.length>2)

dictionary = new Set(words)

console.log("Sanoja:",dictionary.size)

})

/* RUUDUKKO */

function generateBoard(){

grid.innerHTML=""
tiles=[]
board=[]

for(let i=0;i<16;i++){

let letter=randomLetter()

board.push(letter)

let div=document.createElement("div")
div.className="tile"
div.textContent=letter

div.dataset.x = i % 4
div.dataset.y = Math.floor(i / 4)

grid.appendChild(div)
tiles.push(div)

}

}
/* GENEROI RUUDUKKO KUNNES SIINA SANOJA */
function generateGoodBoard(){

let attempts=0

while(true){

generateBoard()

let words=findWords()

if(words>15){
console.log("HyvĂ¤ ruudukko lĂ¶ytyi:",words,"sanaa")
break
}

attempts++

if(attempts>100) break

}

}
  
/* VIEREKKAISYYSTARKISTUS */
function isNeighbor(tile){

if(usedTiles.length===0) return true

let last = usedTiles[usedTiles.length-1]

let x1 = Number(last.dataset.x)
let y1 = Number(last.dataset.y)

let x2 = Number(tile.dataset.x)
let y2 = Number(tile.dataset.y)

return Math.abs(x1-x2)<=1 && Math.abs(y1-y2)<=1

}

/* POINTER EVENTS */

grid.addEventListener("pointerdown",e=>{

if(!e.target.classList.contains("tile"))return

selecting=true
addTile(e.target)

})

grid.addEventListener("pointermove",e=>{

if(!selecting)return

let el=document.elementFromPoint(e.clientX,e.clientY)

if(el && el.classList.contains("tile")){
addTile(el)
}

})

window.addEventListener("pointerup",()=>{

if(!selecting)return

selecting=false
checkWord()

clearSelection()

})

function addTile(tile){

if(usedTiles.includes(tile))return
if(!isNeighbor(tile)) return

tile.classList.add("active")

usedTiles.push(tile)

currentWord+=tile.textContent

document.getElementById("word").textContent=currentWord

}
/* ETSI SANAT RUUDUKOSTA */
function findWords(){

let found=0

function dfs(x,y,word,visited){

word+=board[y*4+x]

if(word.length>2 && dictionary.has(word.toLowerCase())){
found++
}

if(word.length>7) return

for(let dx=-1;dx<=1;dx++){
for(let dy=-1;dy<=1;dy++){

let nx=x+dx
let ny=y+dy

if(nx<0||ny<0||nx>=4||ny>=4) continue

let key=nx+"-"+ny
if(visited.has(key)) continue

let newVisited=new Set(visited)
newVisited.add(key)

dfs(nx,ny,word,newVisited)

}
}

}

for(let x=0;x<4;x++){
for(let y=0;y<4;y++){

let visited=new Set()
visited.add(x+"-"+y)

dfs(x,y,"",visited)

}
}

return found

}
/* TARKISTUS */

function checkWord(){

let w=currentWord.toLowerCase()

if(dictionary.has(w) && !foundWords.has(w)){

foundWords.add(w)

let pts=w.length-2

score+=pts

document.getElementById("score").textContent="Pisteet: "+score

let div=document.createElement("div")
div.textContent=w

document.getElementById("found").appendChild(div)

}

}

/* NOLLAUS */

function clearSelection(){

usedTiles.forEach(t=>t.classList.remove("active"))

usedTiles=[]
currentWord=""

document.getElementById("word").textContent=""

}

/* TIMER */

let time=120

let timer=setInterval(()=>{

time--

document.getElementById("timer").textContent="Aika: "+time

if(time<=0){

clearInterval(timer)

alert("Peli ohi! Pisteet: "+score)

}

},1000)

</script>

</body>
</html>
