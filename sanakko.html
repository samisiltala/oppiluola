<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sanaluola</title>

<audio id="blip" src="blip.mp3"></audio>
<audio id="win" src="voitto.wav"></audio>
<audio id="bip" src="bip.mp3"></audio>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cinzel',serif;
background:url("papyrus.jpg") center/cover no-repeat fixed;
color:white;
text-align:center;
margin:0;
}

button{
font-family:'Cinzel', serif;
text-transform:uppercase;
letter-spacing:2px;
}

/* OVERLAY */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("papyrus.jpg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
overflow:hidden;
}

#matrixCanvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
opacity:0.18;
z-index:0;
}

.overlayBox{
text-transform:uppercase;
letter-spacing:1px;
background:rgba(20,20,20,0.92);
padding:50px 70px;
border-radius:18px;
max-width:560px;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
z-index:10;
position:relative;
}

.overlayBox h2{
font-size:56px;
margin:0;
color:#e8e8e8;
}

#nameInput{
font-family:'Cinzel', serif;
font-size:24px;
padding:10px;
border:none;
border-radius:8px;
text-align:center;
text-transform:uppercase;
}

/* PELI */

.container{
display:grid;
grid-template-columns:200px 1fr 220px;
gap:30px;
max-width:1000px;
margin:30px auto;
}

.leftPanel{
display:flex;
flex-direction:column;
gap:20px;
align-items:flex-start;
background:rgba(0,0,0,0.75);
padding:20px;
border-radius:15px;
}

#timer{font-size:42px;font-weight:bold;}
#score{font-size:36px;font-weight:bold;}

.centerGame{
display:flex;
flex-direction:column;
align-items:center;
}

#grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:14px;
margin-top:30px;
touch-action:none;
}

.tile{
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-family:'JetBrains Mono', monospace;
font-size:34px;
font-weight:600;
color:#222;
background:linear-gradient(#f4f1e6,#ddd6c3);
border:1px solid rgba(0,0,0,0.25);
border-radius:12px;
cursor:pointer;
user-select:none;
}

.tile.active{
background:linear-gradient(#fff7d6,#e9d58f);
}

.rightPanel{
background:#222;
padding:15px;
border-radius:15px;
max-height:400px;
overflow:auto;
}

#word{
margin-top:40px;
font-family:'JetBrains Mono', monospace;
font-size:46px;
letter-spacing:6px;
min-height:50px;
color:black;
background:rgba(255,255,255,0.85);
padding:10px 25px;
border-radius:12px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="overlay">

<canvas id="matrixCanvas"></canvas>

<div class="overlayBox">
<h2 id="gameTitle">SALAISET SANAT</h2>
<input id="nameInput" placeholder="Nimesi" maxlength="6">
<button onclick="startGame()">Aloita peli</button>
</div>

</div>

<div class="container">

<div class="leftPanel">
<div id="playerName"></div>
<div id="timer">Aika: 120</div>
<div id="score">Pisteet: 0</div>
<div id="debugWords">Sanat: 0 / 0</div>
<button onclick="toggleMusic()">Musiikki</button>
</div>

<div class="centerGame">
<div id="grid"></div>
<div id="word"></div>
</div>

<div class="rightPanel">
<h3>Löydetyt sanat</h3>
<div id="found"></div>
</div>

</div>

<script>

let grid=document.getElementById("grid")

document.addEventListener("input",(e)=>{

if(e.target.id!=="nameInput") return
if(e.inputType==="deleteContentBackward") return

let bip=document.getElementById("bip")
bip.currentTime=0
bip.play()

})

let board=[]
let tiles=[]

let music=new Audio("sanatausta.mp3")
music.loop=true
music.volume=0.25

let currentWord=""
let score=0
let time=120
let timer

let selecting=false
let usedTiles=[]
let foundWords=new Set()

let playerName=""

let dictionary=new Set()
let prefixes=new Set()
let validWords=new Set()
let maxScore=0

let dice=[
"AAEIOU","AEIOUY","AEIOUY","AAEIOU",
"NNRSTL","NNRSTL","RSTLNA","RSTLNA",
"KKRTLN","HMPLVK","DEIINS","TLAEIN",
"ÄÄÖEEA","ÄÖAEIO","EEEAAA","EEEIII"
]

fetch("sanat.txt")
.then(r=>r.text())
.then(data=>{

let words=data.split("\n")
.map(w=>w.trim().toLowerCase())
.filter(w=>w.length>2)

dictionary=new Set(words)

words.forEach(word=>{
for(let i=1;i<=word.length;i++){
prefixes.add(word.slice(0,i))
}
})

})

function startMatrix(){

const canvas=document.getElementById("matrixCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const fontSize=18
const columns=Math.floor(canvas.width/fontSize)

const drops=[]

for(let x=0;x<columns;x++){
drops[x]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#6aff9c"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,50)

}

function startGame(){

document.getElementById("matrixCanvas").style.display="none"

let name=document.getElementById("nameInput").value.trim().toUpperCase()

if(name===""){
alert("Kirjoita nimesi ensin")
return
}

playerName=name

document.getElementById("playerName").textContent="👤 "+playerName
document.getElementById("overlay").style.display="none"

score=0
time=120
foundWords.clear()

generateGoodBoard()
startTimer()
music.play()

}

function generateGoodBoard(){

let minWords=100
let attempts=0

while(true){

generateBoard()
findAllWords()
attempts++

if(validWords.size>=minWords){
break
}

if(attempts>100){
break
}

}

}

function generateBoard(){

grid.innerHTML=""
tiles=[]
board=[]

let shuffled=[...dice].sort(()=>Math.random()-0.5)

for(let i=0;i<16;i++){

let die=shuffled[i]
let letter=die[Math.floor(Math.random()*6)]

board.push(letter)

let div=document.createElement("div")
div.className="tile"
div.textContent=letter

div.dataset.x=i%4
div.dataset.y=Math.floor(i/4)

grid.appendChild(div)
tiles.push(div)

}

}

function isNeighbor(tile){

if(usedTiles.length===0) return true

let last=usedTiles[usedTiles.length-1]

let x1=Number(last.dataset.x)
let y1=Number(last.dataset.y)

let x2=Number(tile.dataset.x)
let y2=Number(tile.dataset.y)

return Math.abs(x1-x2)<=1 && Math.abs(y1-y2)<=1

}

grid.addEventListener("pointerdown",e=>{

if(!e.target.classList.contains("tile"))return

selecting=true
grid.setPointerCapture(e.pointerId)
addTile(e.target)

})

grid.addEventListener("pointermove",e=>{

if(!selecting) return

let tile=document.elementFromPoint(e.clientX,e.clientY)

if(!tile || !tile.classList.contains("tile")) return

if(tile===usedTiles[usedTiles.length-1]) return
if(!isNeighbor(tile)) return

addTile(tile)

})

window.addEventListener("pointerup",()=>{

if(!selecting)return

selecting=false

checkWord()
clearSelection()

})

function addTile(tile){

if(usedTiles.includes(tile)) return

tile.classList.add("active")
usedTiles.push(tile)

currentWord+=tile.textContent
document.getElementById("word").textContent=currentWord

}

function getPoints(len){

if(len<=4) return 1
if(len==5) return 2
if(len==6) return 3
if(len==7) return 5
return 11

}

function checkWord(){

let w=currentWord.toLowerCase()

if(validWords.has(w) && !foundWords.has(w)){

foundWords.add(w)

let pts=getPoints(w.length)

score+=pts

document.getElementById("score").textContent="Pisteet: "+score

let div=document.createElement("div")
div.textContent=w+" +"+pts
document.getElementById("found").prepend(div)

document.getElementById("blip").play()

}

}

function clearSelection(){

usedTiles.forEach(t=>t.classList.remove("active"))

usedTiles=[]
currentWord=""

document.getElementById("word").textContent=""

}

function startTimer(){

clearInterval(timer)

timer=setInterval(()=>{

time--
document.getElementById("timer").textContent="Aika: "+time

if(time<=0) endGame()

},1000)

}

function endGame(){

clearInterval(timer)

document.getElementById("win").play()

alert("Peli ohi! Pisteet: "+score)

}

function toggleMusic(){

if(music.paused) music.play()
else music.pause()

}

window.addEventListener("load",()=>{
startMatrix()
})

</script>

</body>
</html>
