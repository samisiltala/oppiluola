<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sanaluola</title>

<style>

body{
margin:0;
background:#0b0b16;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
font-size:40px;
}

#grid{
width:320px;
margin:40px auto;

display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.cell{

width:70px;
height:70px;

background:#1d1d3a;

border-radius:10px;

display:flex;
align-items:center;
justify-content:center;

font-size:32px;

cursor:pointer;

user-select:none;

transition:0.2s;

}

.cell.active{
background:#00cfff;
color:black;
}

#word{
font-size:28px;
margin-top:20px;
letter-spacing:4px;
}

button{

margin-top:20px;
padding:10px 20px;
font-size:18px;

border:none;
border-radius:8px;

background:#00cfff;
cursor:pointer;

}

#result{
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<h1>🔤 Sanaluola</h1>

<div id="grid"></div>

<div id="word"></div>

<button onclick="checkWord()">Tarkista</button>

<div id="result"></div>

<script>

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖ"

let grid=document.getElementById("grid")
let currentWord=""
let selected=[]

/* luo ruudukko */

function createGrid(){

grid.innerHTML=""

for(let i=0;i<16;i++){

let letter=letters[Math.floor(Math.random()*letters.length)]

let cell=document.createElement("div")

cell.className="cell"
cell.textContent=letter

cell.dataset.index=i

cell.onmousedown=start
cell.onmouseover=drag

grid.appendChild(cell)

}

}

let dragging=false

function start(e){

clearSelection()

dragging=true

addLetter(e.target)

}

function drag(e){

if(!dragging) return

if(e.target.classList.contains("cell")){
addLetter(e.target)
}

}

document.body.onmouseup=()=>dragging=false

function addLetter(cell){

if(selected.includes(cell)) return

cell.classList.add("active")

selected.push(cell)

currentWord+=cell.textContent

updateWord()

}

function updateWord(){

document.getElementById("word").textContent=currentWord

}

function clearSelection(){

selected.forEach(c=>c.classList.remove("active"))

selected=[]

currentWord=""

updateWord()

}

/* sanalista */

let words=[]

fetch("sanat.txt")
.then(r=>r.text())
.then(data=>{
words=data.split("\n").map(w=>w.trim().toLowerCase())
   .filter(w => w.length > 2);

dictionary = new Set(words);

console.log("Sanoja ladattu:", dictionary.size);

});


function checkWord(){

let w=currentWord.toLowerCase()

if(words.includes(w)){

document.getElementById("result").textContent="✔ Sana löytyy!"

}else{

document.getElementById("result").textContent="✖ Ei sanalistassa"

}

clearSelection()

}

createGrid()

</script>

</body>
</html>
