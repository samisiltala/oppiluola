<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2B:n Kertotaulukisa</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>

body {
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0a0f2c, #000000);
    margin: 0;
}

h1 {
    text-align: center;
    margin: 20px 0;
}

/* ===== GRID LAYOUT ===== */

.container {
    display: grid;
    grid-template-columns: 240px 1fr 300px;
    gap: 30px;
    padding: 20px 40px;
}

/* ===== LEFT PANEL ===== */

.leftPanel {
    display: flex;
    flex-direction: column;
    gap: 20px;
    font-size: 18px;
}

.settings {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* ===== CENTER GAME ===== */

.centerGame {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.scoreboard {
    display: flex;
    gap: 40px;
    font-size: 30px;
    margin: 15px 0;
}

#lives {
    font-size: 28px;
}

#question {
    font-size: clamp(60px, 8vw, 140px);
    background: rgba(0, 255, 255, 0.08);
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
    border-radius: 25px;
    padding: 40px;
    margin: 20px 0;
}

#statusMessage {
    font-size: 22px;
    min-height: 30px;
}

.buttonContainer {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 10px;
}

button {
    font-size: 24px;
    padding: 12px 20px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
    background: #ffd700;
    box-shadow: 0 0 15px #ffd700;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px #ffd700;
}

.correct { background-color: #4CAF50 !important; }
.wrong { background-color: #f44336 !important; }

/* ===== RIGHT PANEL ===== */

.right {
    background: rgba(0, 255, 255, 0.08);
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
    border-radius: 20px;
    padding: 20px;
}

#timer, #score {
    text-shadow: 0 0 15px #00ffff;
}

</style>
</head>

<body>

<a href="index.html" style="
position:fixed;
top:20px;
left:20px;
font-size:16px;
background:#00ffff;
color:black;
padding:8px 16px;
border-radius:10px;
text-decoration:none;
box-shadow:0 0 10px #00ffff;
">
🏠 KOTI
</a>

<h1>⭐ 2B:n kertotaulukisa ⭐</h1>

<div class="container">

    <!-- LEFT -->
    <div class="leftPanel">
        <div class="settings">

            <div>
                Taso:<br>
                <select id="levelSelect">
                    <option value="1">🟢 Helppo</option>
                    <option value="2">🔵 Normaali</option>
                    <option value="3">🔴 Super</option>
                </select>
            </div>

            <div>
                Teema:<br>
                <select id="themeSelect">
                    <option value="panda">🐼 Panda</option>
                    <option value="frog">🐸 Sammakko</option>
                    <option value="space">🚀 Avaruus</option>
                    <option value="ice">🧊 Jää</option>
                </select>
            </div>

            <div>
                Nimi:<br>
                <input id="name">
            </div>

            <button onclick="startGame()">Aloita</button>

        </div>
    </div>

    <!-- CENTER -->
    <div class="centerGame">

        <div id="mascot" style="font-size:70px;">🐼</div>

        <div class="scoreboard">
            <div id="timer">Aika: 60</div>
            <div id="score">Pisteet: 0</div>
        </div>

        <div id="lives">❤️❤️❤️</div>

        <div id="question"></div>
        <div id="statusMessage"></div>

        <div class="buttonContainer">
            <button id="btn0" onclick="choose(0)"></button>
            <button id="btn1" onclick="choose(1)"></button>
            <button id="btn2" onclick="choose(2)"></button>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>🏆 TOP-3</h2>
        <div id="top3"></div>

        <h3>📊 TOP-10</h3>
        <div id="leaderboard"></div>
    </div>

</div>

<script>

/* --- MINIMAL GAME ENGINE --- */

let a,b,correctAnswer;
let score=0,lives=3,timeLeft=60;
let timerInterval;

function changeTheme(){
 let theme=document.getElementById("themeSelect").value;
 let body=document.body;
 let mascot=document.getElementById("mascot");

 if(theme==="panda"){
   body.style.background="linear-gradient(to bottom,#87CEEB,#ffffff)";
   body.style.color="black";
   mascot.innerText="🐼";
 }
 if(theme==="frog"){
   body.style.background="linear-gradient(to bottom,#6ecf68,#ffffff)";
   body.style.color="black";
   mascot.innerText="🐸";
 }
 if(theme==="space"){
   body.style.background="linear-gradient(to bottom,#000022,#222244)";
   body.style.color="white";
   mascot.innerText="🚀";
 }
 if(theme==="ice"){
   body.style.background="linear-gradient(to bottom,#aeefff,#ffffff)";
   body.style.color="black";
   mascot.innerText="🧊";
 }
}

function newQuestion(){
 a=Math.floor(Math.random()*10)+1;
 b=Math.floor(Math.random()*10)+1;
 correctAnswer=a*b;
 document.getElementById("question").innerText=a+" × "+b;

 let answers=[correctAnswer];
 while(answers.length<3){
   let wrong=Math.floor(Math.random()*100);
   if(!answers.includes(wrong)) answers.push(wrong);
 }
 answers.sort(()=>Math.random()-0.5);

 for(let i=0;i<3;i++){
   document.getElementById("btn"+i).innerText=answers[i];
   document.getElementById("btn"+i).dataset.value=answers[i];
 }
}

function choose(i){
 let value=Number(document.getElementById("btn"+i).dataset.value);
 if(value===correctAnswer){
   score++;
 } else {
   lives--;
 }
 document.getElementById("score").innerText="Pisteet: "+score;
 document.getElementById("lives").innerText="❤️".repeat(lives);
 if(lives<=0) return alert("Peli ohi!");
 newQuestion();
}

function startGame(){
 score=0; lives=3;
 document.getElementById("score").innerText="Pisteet: 0";
 document.getElementById("lives").innerText="❤️❤️❤️";
 newQuestion();
}

document.getElementById("themeSelect").addEventListener("change",changeTheme);
changeTheme();

</script>

</body>
</html>
