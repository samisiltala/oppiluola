<!DOCTYPE html>
<html lang="fi">
<head>

<meta charset="UTF-8">
<title>DUEL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow:hidden;
}

.arena{
display:flex;
height:100vh;
}

.player{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.playerName{
font-size:32px;
margin-bottom:10px;
}

.score{
font-size:60px;
margin-bottom:30px;
}

.buttons{
display:flex;
flex-direction:column;
gap:20px;
}

.leftPlayer button{
font-size:50px;
padding:30px 50px;
background:white;
color:black;
border:none;
border-radius:20px;
}

.rightPlayer button{
font-size:50px;
padding:30px 50px;
background:#e0001a;
color:white;
border:none;
border-radius:20px;
}

.centerQuestion{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
font-size:90px;
}

#duelBar{
position:absolute;
top:74%;
left:50%;
transform:translateX(-50%);
width:320px;
height:16px;
border:2px solid white;
border-radius:8px;
overflow:hidden;
display:flex;
}

#barWhite{
background:white;
width:50%;
}

#barRed{
background:#e0001a;
width:50%;
}

#overlay{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
}

.nameInput{
font-size:26px;
padding:10px;
text-align:center;
background:black;
color:white;
border:2px solid white;
border-radius:10px;
text-transform:uppercase;
}

.startButton{
font-size:40px;
padding:20px 60px;
background:black;
color:white;
border:2px solid white;
border-radius:20px;
cursor:pointer;
}

.countdown{
font-size:120px;
}

</style>
</head>

<body>

<div class="centerQuestion" id="question"></div>

<div id="duelBar">
<div id="barWhite"></div>
<div id="barRed"></div>
</div>

<div id="overlay">

<input id="nameInputA" class="nameInput" placeholder="PELAAJA 1">
<input id="nameInputB" class="nameInput" placeholder="PELAAJA 2">

<button onclick="startCountdown()" class="startButton">
ALOITA
</button>

<div id="countdown" class="countdown" style="display:none"></div>

</div>

<div class="arena">

<div class="player leftPlayer">
<div class="playerName" id="nameA">Pelaaja 1</div>
<div class="score" id="scoreA">0</div>
<div class="buttons" id="buttonsA"></div>
</div>

<div class="player rightPlayer">
<div class="playerName" id="nameB">Pelaaja 2</div>
<div class="score" id="scoreB">0</div>
<div class="buttons" id="buttonsB"></div>
</div>

</div>

<script>

let scoreA=0
let scoreB=0
let correctAnswer
let gameActive=false
let answered=false

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function startCountdown(){

let nameA=document.getElementById("nameInputA").value.trim()
let nameB=document.getElementById("nameInputB").value.trim()

if(!nameA || !nameB){
alert("Anna nimet")
return
}

document.getElementById("nameA").innerText=nameA
document.getElementById("nameB").innerText=nameB

let overlay=document.getElementById("overlay")
let countdown=document.getElementById("countdown")

countdown.style.display="block"
countdown.innerText="3"

let count=3

let timer=setInterval(()=>{

count--

if(count>0){
countdown.innerText=count
}

else if(count===0){
countdown.innerText="GO!"
}

else{

clearInterval(timer)

overlay.style.display="none"
countdown.style.display="none"

gameActive=true

newQuestion()

}

},1000)

}

function generateQuestion(){

let a=rand(1,10)
let b=rand(1,10)

correctAnswer=a*b

document.getElementById("question").innerText=a+" × "+b

let answers=[correctAnswer]

while(answers.length<3){
let wrong=correctAnswer+rand(-10,10)
if(wrong>0 && !answers.includes(wrong)){
answers.push(wrong)
}
}

answers.sort(()=>Math.random()-0.5)

createButtons("buttonsA",answers,"A")
createButtons("buttonsB",answers,"B")

}

function newQuestion(){

answered=false
generateQuestion()

}

function createButtons(id,answers,player){

let container=document.getElementById(id)
container.innerHTML=""

answers.forEach(ans=>{

let btn=document.createElement("button")
btn.innerText=ans
btn.onclick=()=>choose(player,ans)

container.appendChild(btn)

})

}

function choose(player,value){

if(!gameActive || answered) return

answered=true

if(value===correctAnswer){

if(player==="A") scoreA++
else scoreB++

}else{

if(player==="A") scoreB++
else scoreA++

}

updateScores()

if(scoreA>=10){
endGame("A")
return
}

if(scoreB>=10){
endGame("B")
return
}

newQuestion()

}

function updateScores(){

document.getElementById("scoreA").innerText=scoreA
document.getElementById("scoreB").innerText=scoreB

let diff=scoreA-scoreB
let white=50+diff*5
let red=50-diff*5

white=Math.max(0,Math.min(100,white))
red=Math.max(0,Math.min(100,red))

document.getElementById("barWhite").style.width=white+"%"
document.getElementById("barRed").style.width=red+"%"

}

function endGame(winner){

gameActive=false

let overlay=document.getElementById("overlay")

let name=winner==="A"
?document.getElementById("nameA").innerText
:document.getElementById("nameB").innerText

overlay.innerHTML=`

<div style="font-size:80px">
TAISTELU OHI
</div>

<div style="font-size:70px">
${name} VOITTI!
</div>

`

overlay.style.display="flex"

}

</script>

</body>
</html>
